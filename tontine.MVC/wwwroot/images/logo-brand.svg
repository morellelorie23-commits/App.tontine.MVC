<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="bgBrand" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#073C2A"/>
      <stop offset="60%"  stop-color="#0F6E56"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
    <linearGradient id="goldBrand" x1="0" y1="0" x2="40" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="coinShB" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#073C2A"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </linearGradient>
  </defs>

  <!-- ══════════════ ICON PART (80×80) ══════════════ -->
  <!-- Background rounded square -->
  <rect x="0" y="0" width="80" height="80" rx="18" fill="url(#bgBrand)"/>

  <!-- Top glow -->
  <ellipse cx="22" cy="16" rx="28" ry="16" fill="rgba(255,255,255,0.06)" transform="rotate(-15 22 16)"/>

  <!-- 3 orbital member dots -->
  <circle cx="40" cy="12"  r="4.5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="16" cy="58"  r="3.5" fill="rgba(255,255,255,0.40)"/>
  <circle cx="64" cy="58"  r="3.5" fill="rgba(255,255,255,0.40)"/>

  <!-- Orbit arcs (dashed) -->
  <path d="M 42.5 15.5 Q 62 24 62 54"
        stroke="rgba(255,255,255,0.28)" stroke-width="2"
        fill="none" stroke-linecap="round" stroke-dasharray="4,3"/>
  <path d="M 62 60 Q 40 74 18 60"
        stroke="rgba(255,255,255,0.28)" stroke-width="2"
        fill="none" stroke-linecap="round" stroke-dasharray="4,3"/>
  <path d="M 18 55 Q 18 24 37.5 15.5"
        stroke="rgba(255,255,255,0.28)" stroke-width="2"
        fill="none" stroke-linecap="round" stroke-dasharray="4,3"/>

  <!-- Arrowheads -->
  <polygon points="42,14 45,10 47,14.5" fill="rgba(255,255,255,0.42)"/>
  <polygon points="61,60 65,63 61,65"   fill="rgba(255,255,255,0.32)"/>
  <polygon points="19,56 15,60 14,55"   fill="rgba(255,255,255,0.32)"/>

  <!-- Gold coin -->
  <circle cx="40" cy="38" r="20" fill="url(#goldBrand)"/>
  <circle cx="40" cy="38" r="20" fill="url(#coinShB)"/>
  <circle cx="40" cy="38" r="16.5" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>

  <!-- "T" on coin -->
  <rect x="29" y="27" width="22"  height="4.2" rx="2.1" fill="#073C2A"/>
  <rect x="35.8" y="27" width="8.4" height="20"  rx="4.2" fill="#073C2A"/>


  <!-- ══════════════ LOGOTYPE TEXT (right side) ══════════════ -->
  <!-- "Tontine" — bold, dark green -->
  <text x="98" y="46"
        font-family="'Poppins', 'Arial Black', Arial, sans-serif"
        font-size="30" font-weight="800"
        fill="url(#textGrad)"
        letter-spacing="-0.5">Tontine</text>

  <!-- "App" — accent green, slightly lighter -->
  <text x="240" y="46"
        font-family="'Poppins', 'Arial Black', Arial, sans-serif"
        font-size="30" font-weight="800"
        fill="#1D9E75"
        letter-spacing="-0.5">App</text>

  <!-- Tagline -->
  <text x="98" y="64"
        font-family="'Poppins', Arial, sans-serif"
        font-size="10.5" font-weight="500"
        fill="#5F9E8A"
        letter-spacing="0.8">Gestion intelligente des tontines</text>

  <!-- Thin accent line between icon and text -->
  <line x1="88" y1="18" x2="88" y2="62" stroke="#0F6E56" stroke-width="1.5" stroke-opacity="0.3"/>
</svg>
