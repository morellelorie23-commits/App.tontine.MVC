<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <defs>
    <linearGradient id="bg44" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#073C2A"/>
      <stop offset="60%" stop-color="#0F6E56"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
    <linearGradient id="gold44" x1="0" y1="0" x2="22" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="coinshine" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="44" height="44" rx="10" fill="url(#bg44)"/>

  <!-- Top-left glow -->
  <ellipse cx="12" cy="9" rx="16" ry="9" fill="rgba(255,255,255,0.07)" transform="rotate(-15 12 9)"/>

  <!-- 3 orbital dots (members in tontine) -->
  <!-- Top -->
  <circle cx="22" cy="6.5" r="2.5" fill="rgba(255,255,255,0.55)"/>
  <!-- Bottom-left -->
  <circle cx="9"  cy="32"  r="2"   fill="rgba(255,255,255,0.4)"/>
  <!-- Bottom-right -->
  <circle cx="35" cy="32"  r="2"   fill="rgba(255,255,255,0.4)"/>

  <!-- Rotation arcs connecting the 3 dots -->
  <path d="M 23.5 8.5 Q 34 14 34 30"
        stroke="rgba(255,255,255,0.28)" stroke-width="1.2"
        fill="none" stroke-linecap="round" stroke-dasharray="2.5,2"/>
  <path d="M 33 32.5 Q 22 40 11 32.5"
        stroke="rgba(255,255,255,0.28)" stroke-width="1.2"
        fill="none" stroke-linecap="round" stroke-dasharray="2.5,2"/>
  <path d="M 10 30 Q 10 14 20.5 8.5"
        stroke="rgba(255,255,255,0.28)" stroke-width="1.2"
        fill="none" stroke-linecap="round" stroke-dasharray="2.5,2"/>

  <!-- Small arrowheads on arcs -->
  <polygon points="23,8 25.5,5.5 26.5,8.5" fill="rgba(255,255,255,0.38)"/>
  <polygon points="33,31.5 35.5,34.5 32.5,35" fill="rgba(255,255,255,0.32)"/>
  <polygon points="11,30.5 8,33 8,29.5" fill="rgba(255,255,255,0.32)"/>

  <!-- Central gold coin -->
  <circle cx="22" cy="21" r="11" fill="url(#gold44)"/>
  <circle cx="22" cy="21" r="11" fill="url(#coinshine)"/>
  <circle cx="22" cy="21" r="9"  fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>

  <!-- "T" lettermark on coin — horizontal bar + vertical stem -->
  <rect x="16" y="15.5" width="12"  height="2.4" rx="1.2" fill="#073C2A"/>
  <rect x="19.8" y="15.5" width="4.4" height="11"  rx="2.2" fill="#073C2A"/>
</svg>
